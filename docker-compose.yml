services:
  paddleocr:
    build: .
    ports:
      - "8099:8000"
    environment:
      # - API_KEY=your-secret-key
      # OCR_CPU_THREADS unset = use all CPUs visible in the container (recommended).
      - OCR_ENABLE_MKLDNN=true
      - OCR_USE_QUEUES=true
      - OCR_DEVICE=cpu
      # Optional tuning (PaddleOCR Docker CPU / #10147): override if needed
      # - OCR_CPU_THREADS=8
      # - KMP_AFFINITY=disabled
      # - KMP_BLOCKTIME=0
    volumes:
      - ocr-data:/data
    restart: unless-stopped

volumes:
  ocr-data:
